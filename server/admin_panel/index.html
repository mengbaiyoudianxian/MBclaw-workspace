<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBclaw — 管理面板</title>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #c9d1d9;
            --text-muted: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
            --red: #f85149;
            --orange: #d2991d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border); position: fixed; top: 0; left: 0; bottom: 0; padding: 20px; overflow-y: auto; }
        .sidebar h1 { font-size: 1.3rem; margin-bottom: 24px; color: var(--accent); }
        .sidebar nav a { display: block; padding: 8px 12px; color: var(--text-muted); text-decoration: none; border-radius: 6px; margin-bottom: 4px; font-size: 0.9rem; }
        .sidebar nav a:hover, .sidebar nav a.active { background: rgba(88,166,255,0.1); color: var(--text); }
        .main { margin-left: 260px; padding: 32px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 1.1rem; margin-bottom: 12px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; }
        .stat { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
        .stat .value { font-size: 2rem; font-weight: bold; }
        .stat .label { color: var(--text-muted); font-size: 0.85rem; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
        .badge-ok { background: rgba(63,185,80,0.2); color: var(--green); }
        .badge-warn { background: rgba(210,153,29,0.2); color: var(--orange); }
        .badge-err { background: rgba(248,81,73,0.2); color: var(--red); }
        table { width: 100%; border-collapse: collapse; }
        th, td { text-align: left; padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        th { color: var(--text-muted); font-weight: 600; }
        button { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        button:hover { opacity: 0.9; }
        .progress-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.3s; }
        pre { background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; overflow-x: auto; font-size: 0.85rem; }
    </style>
</head>
<body>
    <aside class="sidebar">
        <h1>🤖 MBclaw</h1>
        <nav>
            <a href="#dashboard" class="active" onclick="showTab('dashboard')">📊 仪表盘</a>
            <a href="#projects" onclick="showTab('projects')">📁 项目</a>
            <a href="#sessions" onclick="showTab('sessions')">💬 会话</a>
            <a href="#memory" onclick="showTab('memory')">🧠 记忆</a>
            <a href="#providers" onclick="showTab('providers')">🔌 模型</a>
            <a href="#tools" onclick="showTab('tools')">🛠 工具</a>
            <a href="#skills" onclick="showTab('skills')">⚡ 技能卡</a>
            <a href="#gateway" onclick="showTab('gateway')">📡 网关</a>
            <a href="#config" onclick="showTab('config')">⚙️ 配置</a>
        </nav>
    </aside>

    <main class="main">
        <div id="tab-dashboard" class="tab-content">
            <h2 style="margin-bottom:20px">📊 仪表盘</h2>
            <div class="stat-grid">
                <div class="stat"><div class="value" id="stat-projects">-</div><div class="label">项目总数</div></div>
                <div class="stat"><div class="value" id="stat-sessions">-</div><div class="label">会话总数</div></div>
                <div class="stat"><div class="value" id="stat-memories">-</div><div class="label">记忆条目</div></div>
                <div class="stat"><div class="value" id="stat-skills">-</div><div class="label">技能卡</div></div>
            </div>
            <div class="card" style="margin-top:16px">
                <h2>系统状态</h2>
                <div id="system-status">加载中...</div>
            </div>
            <div class="card">
                <h2>LLM 配置</h2>
                <div id="llm-config">加载中...</div>
            </div>
        </div>
        <div id="tab-projects" class="tab-content" style="display:none"><div class="card"><h2>📁 项目</h2><div id="projects-list">加载中...</div></div></div>
        <div id="tab-sessions" class="tab-content" style="display:none"><div class="card"><h2>💬 会话</h2><div id="sessions-list">加载中...</div></div></div>
        <div id="tab-memory" class="tab-content" style="display:none"><div class="card"><h2>🧠 记忆</h2><div id="memory-content">加载中...</div></div></div>
        <div id="tab-providers" class="tab-content" style="display:none"><div class="card"><h2>🔌 模型管理</h2><div id="providers-content">加载中...</div></div></div>
        <div id="tab-tools" class="tab-content" style="display:none"><div class="card"><h2>🛠 工具索引</h2><div id="tools-list">加载中...</div></div></div>
        <div id="tab-skills" class="tab-content" style="display:none"><div class="card"><h2>⚡ 技能卡</h2><div id="skills-list">加载中...</div></div></div>
        <div id="tab-gateway" class="tab-content" style="display:none"><div class="card"><h2>📡 消息网关</h2><div id="gateway-status">加载中...</div></div></div>
        <div id="tab-config" class="tab-content" style="display:none"><div class="card"><h2>⚙️ 配置</h2>
            <form id="config-form">
                <label>LLM Provider: <input name="provider" id="cfg-provider" class="form-input"></label><br><br>
                <label>Model: <input name="model" id="cfg-model" class="form-input"></label><br><br>
                <label>API Key: <input name="api_key" id="cfg-api-key" type="password" class="form-input"></label><br><br>
                <label>Base URL: <input name="base_url" id="cfg-base-url" class="form-input"></label><br><br>
                <button type="submit">保存配置</button>
            </form>
        </div></div>
    </main>

    <script>
        const API = '/api';

        function showTab(name) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            const tab = document.getElementById('tab-' + name);
            if (tab) tab.style.display = 'block';
            const link = document.querySelector(`nav a[href="#${name}"]`);
            if (link) link.classList.add('active');
            loadTabData(name);
        }

        async function api(path) {
            try {
                const resp = await fetch(API + path);
                if (!resp.ok) return null;
                return await resp.json();
            } catch (e) { console.error(e); return null; }
        }

        async function loadTabData(tab) {
            switch(tab) {
                case 'dashboard':
                    const projects = await api('/projects');
                    const skills = await api('/skills');
                    const health = await api('/health');
                    if (projects) document.getElementById('stat-projects').textContent = projects.length;
                    if (skills) document.getElementById('stat-skills').textContent = skills.length;
                    if (health) {
                        document.getElementById('system-status').innerHTML =
                            `<span class="badge badge-${health.status==='ok'?'ok':'err'}">${health.status}</span> ` +
                            `Uptime: ${health.uptime_seconds || 0}s | DB: ${health.database || '?'}`;
                    }
                    const llmCfg = await api('/providers');
                    if (llmCfg) {
                        const c = llmCfg.current;
                        document.getElementById('llm-config').innerHTML =
                            `<span class="badge badge-${c.enabled?'ok':'warn'}">${c.enabled?'启用':'禁用'}</span> ` +
                            `Provider: ${c.provider} | Model: ${c.model} | Base: ${c.base_url}`;
                    }
                    // Count sessions across projects
                    let sessionCount = 0, memoryCount = 0;
                    if (projects) {
                        for (const p of projects) {
                            const sessions = await api(`/projects/${p.id}/sessions`);
                            if (sessions) sessionCount += sessions.length;
                        }
                    }
                    document.getElementById('stat-sessions').textContent = sessionCount;
                    document.getElementById('stat-memories').textContent = '-';
                    break;
                case 'projects':
                    const projs = await api('/projects');
                    if (projs) {
                        document.getElementById('projects-list').innerHTML =
                            '<table><tr><th>ID</th><th>名称</th><th>用户ID</th><th>创建时间</th></tr>' +
                            projs.map(p => `<tr><td>${p.id}</td><td>${p.name}</td><td>${p.user_id}</td><td>${p.created_at||''}</td></tr>`).join('') +
                            '</table>';
                    }
                    break;
                case 'providers':
                    const provs = await api('/providers');
                    if (provs) {
                        let html = '<table><tr><th>Provider</th><th>状态</th><th>描述</th><th>操作</th></tr>';
                        for (const p of provs.providers) {
                            html += `<tr><td>${p.name}</td><td><span class="badge badge-${p.status==='available'?'ok':'warn'}">${p.status}</span></td><td>${p.description||''}${p.free_trial?'<br><small>'+p.free_trial+'</small>':''}</td><td>${p.requires_key?'<button onclick="alert(\'请在配置页面设置API Key\')">配置</button>':'-'}</td></tr>`;
                        }
                        html += '</table>';
                        document.getElementById('providers-content').innerHTML = html;
                    }
                    break;
                default:
                    break;
            }
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const body = new URLSearchParams();
            body.set('provider', document.getElementById('cfg-provider').value);
            body.set('model', document.getElementById('cfg-model').value);
            body.set('api_key', document.getElementById('cfg-api-key').value);
            body.set('base_url', document.getElementById('cfg-base-url').value);
            const resp = await fetch(API + '/providers/configure', { method: 'POST', body });
            const result = await resp.json();
            alert(result.success ? '配置已保存' : '保存失败');
        });

        showTab('dashboard');
    </script>
</body>
</html>
